name: crisis_response_app
description: Rapid Crisis Response — Hospital emergency coordination app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.1
  dio: ^5.4.3

  # Firebase / FCM
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.2

  # Audio recording for voice input
  record: ^6.0.0
  permission_handler: ^11.3.1
  
  # Google Cloud Speech-to-Text v2
  google_speech: ^3.1.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Utilities
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
